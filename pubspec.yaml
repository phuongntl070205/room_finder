name: room_finder
description: Ứng dụng tìm trọ thông minh cho sinh viên
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ─────────────────────────────
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0

  # ── Auth & Social ─────────────────────────
  google_sign_in: ^6.2.1

  # ── Maps & Location ───────────────────────
  google_maps_flutter: ^2.5.0
  geoflutterfire2: ^2.3.14
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.0

  # ── Media ─────────────────────────────────
  image_picker: ^1.0.7
  video_player: ^2.8.3
  flutter_image_compress: ^2.1.0
  cached_network_image: ^3.3.1
  photo_view: ^0.15.0
  url_launcher: ^6.2.5

  # ── State & Navigation ────────────────────
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0

  # ── UI ─────────────────────────────────────
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0

  # ── Utils ──────────────────────────────────
  intl: ^0.19.0
  http: ^1.6.0
  shared_preferences: ^2.2.2
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/


